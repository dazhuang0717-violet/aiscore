
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>罗氏肿瘤领域-传播效能AI评分模型</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 可视化与文件处理库 -->
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.8/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --pop-bg: #FFF8E1;
            --pop-accent-yellow: #FFEB3B;
            --pop-accent-pink: #FF4081;
            --pop-accent-cyan: #00BCD4;
            --pop-accent-orange: #FF5722;
            --pop-ink: #000000;
            --pop-border: 3px;
            --pop-shadow: 6px 6px 0px #000000;
        }

        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;700;900&display=swap');

        body { 
            background-color: var(--pop-bg); 
            color: var(--pop-ink); 
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            background-image: radial-gradient(var(--pop-ink) 1px, transparent 1px);
            background-size: 30px 30px;
            background-attachment: fixed;
        }

        h1, h2, h3 {
            font-family: 'Anton', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .st-sidebar {
            background-color: var(--pop-accent-yellow);
            border-right: var(--pop-border) solid var(--pop-ink);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            padding: 2rem 1.5rem;
            overflow-y: auto;
            z-index: 100;
            box-shadow: 4px 0 0 var(--pop-ink);
        }

        @media (max-width: 768px) {
            .st-sidebar {
                transform: translateX(-100%);
                width: 280px !important;
                padding-top: 4rem;
            }
            .st-sidebar.open {
                transform: translateX(0);
            }
            .main-content {
                padding: 5rem 1rem 2rem 1rem !important;
                margin-left: 0 !important;
            }
            .mobile-toggle {
                display: flex !important;
            }
            h1 { font-size: 2rem !important; }
        }

        .main-content {
            padding: 4rem;
            min-height: 100vh;
            max-width: 1400px;
        }

        .mobile-toggle {
            display: none;
            position: fixed;
            top: 1.25rem;
            left: 1.25rem;
            z-index: 110;
            background: var(--pop-accent-pink);
            color: white;
            border: var(--pop-border) solid var(--pop-ink);
            border-radius: 0;
            width: 50px;
            height: 50px;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 4px 4px 0 var(--pop-ink);
        }

        .resize-handle {
            width: 4px;
            height: 100vh;
            cursor: col-resize;
            position: fixed;
            z-index: 101;
            background: var(--pop-ink);
        }

        .st-input {
            width: 100%;
            padding: 14px 18px;
            border: var(--pop-border) solid var(--pop-ink);
            border-radius: 0;
            margin-bottom: 1.5rem;
            font-size: 16px;
            font-weight: 700;
            color: var(--pop-ink);
            background-color: #fff;
            outline: none;
            box-shadow: 4px 4px 0 var(--pop-ink);
        }
        .st-input:focus {
            background-color: var(--pop-accent-yellow);
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0 var(--pop-ink);
        }

        .st-button-primary {
            background-color: var(--pop-accent-cyan);
            color: var(--pop-ink);
            border: var(--pop-border) solid var(--pop-ink);
            padding: 1rem 2rem;
            border-radius: 0;
            cursor: pointer;
            font-weight: 900;
            text-transform: uppercase;
            font-family: 'Anton', sans-serif;
            transition: all 0.1s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 18px;
            box-shadow: 6px 6px 0 var(--pop-ink);
        }
        .st-button-primary:hover {
            background-color: var(--pop-accent-pink);
            transform: translate(-2px, -2px);
            box-shadow: 8px 8px 0 var(--pop-ink);
            color: white;
        }
        .st-button-primary:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 var(--pop-ink);
        }

        .st-tabs-list {
            display: flex;
            background: var(--pop-ink);
            padding: 6px;
            border-radius: 0;
            margin-bottom: 3rem;
            width: fit-content;
            box-shadow: 8px 8px 0 var(--pop-accent-orange);
        }
        .st-tab {
            padding: 10px 24px;
            cursor: pointer;
            border-radius: 0;
            color: white;
            font-size: 16px;
            transition: all 0.2s ease;
            font-weight: 900;
            text-transform: uppercase;
        }
        .st-tab:hover {
            background: rgba(255,255,255,0.2);
        }
        .st-tab-active {
            background: var(--pop-accent-yellow);
            color: var(--pop-ink);
        }

        .st-metric {
            background: #fff;
            padding: 2rem;
            border-radius: 0;
            border: var(--pop-border) solid var(--pop-ink);
            text-align: left;
            box-shadow: 8px 8px 0 var(--pop-accent-cyan);
            transition: transform 0.2s ease;
        }
        .st-metric:hover {
            transform: translate(-4px, -4px);
            box-shadow: 12px 12px 0 var(--pop-accent-cyan);
        }
        .st-metric.highlighted {
            background: var(--pop-accent-yellow);
            box-shadow: 8px 8px 0 var(--pop-accent-pink);
        }
        .st-metric-label {
            font-size: 14px;
            font-weight: 900;
            color: var(--pop-ink);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        .st-metric-value {
            font-size: 36px;
            font-family: 'Anton', sans-serif;
            color: var(--pop-ink);
        }

        .st-expander {
            background: #fff;
            border: var(--pop-border) solid var(--pop-ink);
            border-radius: 0;
            margin-bottom: 2.5rem;
            overflow: hidden;
            box-shadow: 10px 10px 0 var(--pop-ink);
        }
        .st-expander-header {
            padding: 1.5rem 2rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            background: var(--pop-accent-orange);
            color: white;
            border-bottom: var(--pop-border) solid var(--pop-ink);
        }
        .st-expander-content {
            padding: 2.5rem;
            background: #fff;
        }

        .st-alert {
            padding: 1.5rem;
            border-radius: 0;
            margin-bottom: 2rem;
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 16px;
            border: var(--pop-border) solid var(--pop-ink);
            box-shadow: 6px 6px 0 var(--pop-ink);
        }
        .st-info {
            background-color: var(--pop-accent-cyan);
            color: var(--pop-ink);
        }
        .st-success {
            background-color: #4CAF50;
            color: white;
        }
        .st-error {
            background-color: var(--pop-accent-pink);
            color: white;
        }

        .apple-card {
            background: #fff;
            border-radius: 0;
            padding: 2.5rem;
            border: var(--pop-border) solid var(--pop-ink);
            box-shadow: 12px 12px 0 var(--pop-accent-yellow);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background-color: var(--pop-ink);
            border: var(--pop-border) solid var(--pop-ink);
            padding: 20px;
            text-align: left;
            font-weight: 900;
            color: white;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }
        td {
            padding: 20px;
            border: var(--pop-border) solid var(--pop-ink);
            color: var(--pop-ink);
            font-size: 16px;
            font-weight: 600;
        }
        tr:nth-child(even) td {
            background-color: rgba(0,0,0,0.03);
        }
        tr:hover td {
            background-color: var(--pop-accent-yellow);
        }

        .marquee {
            background: var(--pop-ink);
            color: var(--pop-accent-yellow);
            padding: 10px 0;
            font-family: 'Anton', sans-serif;
            font-size: 24px;
            text-transform: uppercase;
            overflow: hidden;
            white-space: nowrap;
            border-bottom: var(--pop-border) solid var(--pop-ink);
            margin-bottom: 2rem;
        }
        .marquee-content {
            display: inline-block;
            animation: marquee 20s linear infinite;
        }
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .animate-fadeIn {
            animation: fadeIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>

        @media print {
            .st-sidebar, .resize-handle, .st-tabs-list, .st-expander, .flex-gap, button, .no-print {
                display: none !important;
            }
            .main-content {
                padding: 0 !important;
                margin: 0 !important;
            }
            .apple-card {
                box-shadow: none !important;
                border: 1px solid #eee !important;
            }
        }
    </style>

<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",
    "vite": "https://esm.sh/vite@^7.3.1"
  }
}
</script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
